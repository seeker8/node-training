<!DOCTYPE html>
<html>

<head>
  <title>Chat App</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
</head>

<body>
  <div class="container-sm">
    <div class="row justify-content-center">
      <div class="col-8">
        <pre class="app-title">
                       _           _      
  __ _  __ _ _ __    _| |_ __   __| |___  
 / _` |/ _` | '_ \  |__ | '_ \ / _` |__ \ 
| (_| | (_| | |_) |  _| | |_) | | | |__) |
 \__, |\__, |_.__/  |__/|_.__/|_| |_|___/ 
    |_|   |_|                                                         
  </pre>
      </div>
    </div>

  </div>
  <div class="container-sm">
    <div class="row justify-content-center">
      <div class="col-6 border border-2 p-2">
        <h1>Join</h1>
        <form action="/chat.html">
          <div class="mb-3">
            <label for="user-name" class="form-label">Display name</label>
            <input class="form-control" type="text" placeholder="Display name" name="username" id="user-name" required>
          </div>
          <div class="mb-3">
            <label for="room-name" class="form-label">Room</label>
            <input class="form-control" type="text" placeholder="Room" id="room-name" required>
          </div>

          <button class="btn btn-primary">Join</button>
        </form>
      </div>
    </div>
  </div>


</body>

</html>
